<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pollaris - Downloads</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Ubuntu', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    line-height: 1.5;
  }

  header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 32px 0 24px;
    text-align: center;
  }

  header img {
    height: 40px;
    margin-bottom: 12px;
  }

  header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #e6edf3;
  }

  header p {
    color: #8b949e;
    margin-top: 4px;
    font-size: 15px;
  }

  main {
    max-width: 720px;
    margin: 32px auto;
    padding: 0 16px;
  }

  section {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  section h2 {
    font-size: 14px;
    font-weight: 700;
    padding: 14px 20px;
    border-bottom: 1px solid #30363d;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #0099ff;
  }

  .item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid #21262d;
    gap: 12px;
  }

  .item:last-child { border-bottom: none; }

  .item-info {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .item-name {
    font-weight: 500;
    font-size: 15px;
    color: #e6edf3;
  }

  .item-detail {
    font-size: 13px;
    color: #8b949e;
    margin-top: 2px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    font-family: 'Ubuntu', sans-serif;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    border-radius: 6px;
    border: 1px solid #0099ff;
    background: transparent;
    color: #0099ff;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
    cursor: pointer;
  }

  .btn:hover {
    background: #0099ff;
    color: #fff;
  }

  .btn svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }

  .empty {
    padding: 20px;
    text-align: center;
    color: #8b949e;
    font-size: 14px;
  }

  .loading {
    padding: 24px;
    text-align: center;
    color: #8b949e;
    font-size: 14px;
  }

  footer {
    text-align: center;
    padding: 24px 16px;
    font-size: 13px;
    color: #484f58;
  }

  @media (max-width: 480px) {
    .item { flex-direction: column; align-items: flex-start; }
    .btn { margin-top: 8px; }
  }
</style>
</head>
<body>

<header>
  <img src="https://www.pollaris.com.br/PollarisWhite.svg" alt="Pollaris">
  <h1>Downloads</h1>
  <p>Atualizações e instaladores</p>
</header>

<main>
  <section id="products-section">
    <h2>Atualizações</h2>
    <div id="products" class="loading">Carregando...</div>
  </section>

  <section>
    <h2>Instaladores</h2>
    <div id="installers"></div>
  </section>

  <section>
    <h2>Utilitários</h2>
    <div id="utils"></div>
  </section>
</main>

<footer>Pollaris Software &amp; Solução</footer>

<script>
const BASE = location.origin;
const DL_ICON = '<svg viewBox="0 0 16 16"><path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14ZM7.25 7.689V2a.75.75 0 0 1 1.5 0v5.689l1.97-1.969a.749.749 0 1 1 1.06 1.06l-3.25 3.25a.749.749 0 0 1-1.06 0L4.22 6.78a.749.749 0 1 1 1.06-1.06l1.97 1.969Z"/></svg>';

const PRODUCTS = [
  { id: 'green', name: 'Pollaris Green' },
  { id: 'snack', name: 'Pollaris Snack' },
];

const INSTALLERS = [
  { name: 'Instalador Pollaris', path: 'instaladores/pollaris/Instalador.exe' },
  { name: 'Instalador Prime Data', path: 'instaladores/primedata/Instalador.exe' },
];

const UTILS = [
  { name: 'Desinstalador', path: 'instalacao/Desinstalador.exe' },
  { name: 'MariaDB 11.4 (Windows x64)', path: 'instalacao/mariadb-11.4-winx64.msi' },
  { name: 'API', path: 'instalacao/Api.zip' },
  { name: 'Layout Balança', path: 'executaveis/LayoutBalanca.exe' },
];

function makeItem(name, detail, url) {
  const div = document.createElement('div');
  div.className = 'item';
  div.innerHTML =
    '<div class="item-info">' +
      '<span class="item-name">' + esc(name) + '</span>' +
      (detail ? '<span class="item-detail">' + esc(detail) + '</span>' : '') +
    '</div>' +
    '<a class="btn" href="' + esc(url) + '">' + DL_ICON + ' Baixar</a>';
  return div;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function loadProducts() {
  const container = document.getElementById('products');
  container.innerHTML = '';
  let count = 0;

  for (const prod of PRODUCTS) {
    try {
      const res = await fetch(BASE + '/' + prod.id + '/' + prod.id + '.json');
      if (!res.ok) continue;
      const data = await res.json();
      container.appendChild(makeItem(prod.name, 'Versão ' + data.versao, data.url));
      count++;
    } catch { /* skip */ }
  }

  if (count === 0) {
    container.innerHTML = '<div class="empty">Nenhuma atualização disponível no momento.</div>';
  }
}

function loadStatic(items, containerId) {
  const container = document.getElementById(containerId);
  for (const item of items) {
    container.appendChild(makeItem(item.name, '', BASE + '/' + item.path));
  }
}

loadProducts();
loadStatic(INSTALLERS, 'installers');
loadStatic(UTILS, 'utils');
</script>

</body>
</html>
