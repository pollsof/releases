name = "pollaris-bot"
main = "src/index.js"
compatibility_date = "2024-09-01"

[vars]
REPO_OWNER = "pollsof"
REPO_NAME = "releases"
VALID_PRODUCTS = "green,snack"
BOT_USERNAME = "PollarisReleasesBot"

