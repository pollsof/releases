name: Deploy Telegram Bot

on:
  push:
    branches: [main]
    paths:
      - 'bot/**'
      - '.github/workflows/deploy-bot.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v4

      - name: Validar secrets do Cloudflare
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "::error::Configure o secret CLOUDFLARE_API_TOKEN em Settings > Secrets and variables > Actions"
            exit 1
          fi
          if [ -z "$CF_ACCOUNT" ]; then
            echo "::error::Configure o secret CLOUDFLARE_ACCOUNT_ID em Settings > Secrets and variables > Actions"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: bot/package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Deploy Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
