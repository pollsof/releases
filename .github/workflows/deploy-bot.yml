name: Deploy Telegram Bot

on:
  push:
    branches: [main]
    paths:
      - 'bot/**'
      - '.github/workflows/deploy-bot.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: bot/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Validar bundle do Worker
        run: npx wrangler deploy --dry-run

      - name: Validar secrets do Cloudflare
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "::error::Secret CLOUDFLARE_API_TOKEN nao configurado."
            echo "Opcao A (mais facil): em https://dash.cloudflare.com/profile/api-tokens use o template 'Edit Cloudflare Workers'."
            echo "Opcao B (token customizado): Account > Workers Scripts > Edit (+ Workers KV Storage > Edit se usar /acesso)."
            echo "Depois adicione o token em Settings > Secrets and variables > Actions > New repository secret."
            exit 1
          fi
          if [ -z "$CF_ACCOUNT" ]; then
            echo "::error::Secret CLOUDFLARE_ACCOUNT_ID nao configurado."
            echo "O Account ID fica em https://dash.cloudflare.com/ (barra lateral direita da home)."
            echo "Adicione como secret CLOUDFLARE_ACCOUNT_ID em Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Deploy Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
